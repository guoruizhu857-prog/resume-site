<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.name }} - {{ data.title }}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- ====== 导航栏 ====== -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-code-slash"></i> {{ data.name }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="切换导航">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">关于我</a></li>
                    <li class="nav-item"><a class="nav-link" href="#experience">经历</a></li>
                    <li class="nav-item"><a class="nav-link" href="#skills">技能</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">项目</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">联系我</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ====== 主体内容 ====== -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ====== 页脚 ====== -->
    <footer class="footer text-center py-4">
        <div class="container">
            <p class="mb-1">
                {% if data.github %}
                <a href="{{ data.github }}" target="_blank" class="footer-link me-3">
                    <i class="bi bi-github"></i> GitHub
                </a>
                {% endif %}
                {% if data.linkedin %}
                <a href="{{ data.linkedin }}" target="_blank" class="footer-link me-3">
                    <i class="bi bi-linkedin"></i> LinkedIn
                </a>
                {% endif %}
                {% if data.email %}
                <a href="mailto:{{ data.email }}" class="footer-link">
                    <i class="bi bi-envelope"></i> {{ data.email }}
                </a>
                {% endif %}
            </p>
            <p class="mb-0 text-muted small">
                &copy; 2024-2026 {{ data.name }} · 用 Flask + Bootstrap 构建
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 平滑滚动 -->
    <script>
        document.querySelectorAll('a.nav-link[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('mainNav');
            if (window.scrollY > 50) {
                nav.classList.add('navbar-scrolled');
            } else {
                nav.classList.remove('navbar-scrolled');
            }
        });
    </script>
</body>
</html>
